name: SonarCloud Gate

# Runs after the CI workflow completes. Uses workflow_run so we have access to
# secrets (SONAR_TOKEN) even for fork PRs. Downloads the lcov coverage artifact
# from CI and runs the SonarCloud scan if no analysis exists yet.
#
# For internal PRs: the scan already ran in CI, so this just reads the results.
# For fork PRs: this is the only place the scan runs (CI skips it, no token).
#
# SECURITY: Checks out PR code only for SonarCloud static analysis. Does NOT
# execute any code from the PR.

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: read
  pull-requests: write
  actions: read

concurrency:
  group: sonarcloud-gate-${{ github.event.workflow_run.id }}
  cancel-in-progress: true

jobs:
  sonarcloud-gate:
    name: SonarCloud Quality Gate
    runs-on: ubuntu-latest
    # Only run for PRs where CI succeeded
    if: >-
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Get PR number
        id: pr
        env:
          PR_JSON: ${{ toJSON(github.event.workflow_run.pull_requests) }}
        run: |
          PR_NUMBER=$(echo "$PR_JSON" | \
            python3 -c "import sys,json; prs=json.load(sys.stdin); print(prs[0]['number'] if prs else '')")
          if [[ -z "$PR_NUMBER" ]]; then
            echo "No PR associated with this workflow run. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
            echo "PR #$PR_NUMBER"
          fi

      - name: Check for existing analysis
        if: steps.pr.outputs.skip != 'true'
        id: check
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [[ -z "$SONAR_TOKEN" ]]; then
            echo "SONAR_TOKEN not configured. Skipping."
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PR="${{ steps.pr.outputs.number }}"
          GATE_JSON=$(curl -s -u "${SONAR_TOKEN}:" \
            "https://sonarcloud.io/api/qualitygates/project_status?projectKey=artifact-keeper_artifact-keeper&pullRequest=${PR}")
          GATE_STATUS=$(echo "$GATE_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['projectStatus']['status'])" 2>/dev/null || echo "NONE")
          echo "Quality gate status from API: $GATE_STATUS"
          echo "status=$GATE_STATUS" >> "$GITHUB_OUTPUT"

      # For fork PRs (or when analysis is missing): download coverage and run scan.
      # Uses refs/pull/N/head from the base repo instead of checking out the fork
      # repo directly, avoiding untrusted repository checkout in privileged context.
      - name: Checkout PR code
        if: steps.check.outputs.status == 'NONE'
        uses: actions/checkout@v6
        with:
          ref: refs/pull/${{ steps.pr.outputs.number }}/head
          fetch-depth: 0

      - name: Download coverage artifact
        if: steps.check.outputs.status == 'NONE'
        uses: actions/download-artifact@v4
        with:
          name: lcov-coverage
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Get PR metadata
        if: steps.check.outputs.status == 'NONE'
        id: pr_meta
        env:
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          PR_JSON: ${{ toJSON(github.event.workflow_run.pull_requests) }}
        run: |
          echo "head_branch=$HEAD_BRANCH" >> "$GITHUB_OUTPUT"
          BASE_REF=$(echo "$PR_JSON" | python3 -c "import sys,json; prs=json.load(sys.stdin); print(prs[0]['base']['ref'] if prs else 'main')" 2>/dev/null || echo "main")
          echo "base_ref=$BASE_REF" >> "$GITHUB_OUTPUT"

      - name: Run SonarCloud Scan
        if: steps.check.outputs.status == 'NONE'
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=artifact-keeper_artifact-keeper
            -Dsonar.organization=artifact-keeper
            -Dsonar.rust.lcov.reportPaths=lcov.info
            -Dsonar.pullrequest.key=${{ steps.pr.outputs.number }}
            -Dsonar.pullrequest.branch=${{ steps.pr_meta.outputs.head_branch }}
            -Dsonar.pullrequest.base=${{ steps.pr_meta.outputs.base_ref }}

      - name: Wait for analysis processing
        if: steps.check.outputs.status == 'NONE'
        run: sleep 15

      # Fetch quality gate results (either from earlier CI scan or our scan above)
      - name: Get quality gate results
        if: steps.pr.outputs.skip != 'true' && steps.check.outputs.status != 'skipped'
        id: gate
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          PR="${{ steps.pr.outputs.number }}"

          # Retry a few times in case analysis is still processing
          for i in 1 2 3; do
            GATE_JSON=$(curl -s -u "${SONAR_TOKEN}:" \
              "https://sonarcloud.io/api/qualitygates/project_status?projectKey=artifact-keeper_artifact-keeper&pullRequest=${PR}")
            GATE_STATUS=$(echo "$GATE_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['projectStatus']['status'])" 2>/dev/null || echo "NONE")
            if [[ "$GATE_STATUS" != "NONE" ]]; then break; fi
            echo "Analysis not ready, waiting... (attempt $i/3)"
            sleep 10
          done

          echo "status=$GATE_STATUS" >> "$GITHUB_OUTPUT"

          if [[ "$GATE_STATUS" == "NONE" ]]; then
            echo "Analysis still not available after retries."
            exit 0
          fi

          METRICS_JSON=$(curl -s -u "${SONAR_TOKEN}:" \
            "https://sonarcloud.io/api/measures/component?component=artifact-keeper_artifact-keeper&metricKeys=new_coverage,new_duplicated_lines_density,new_lines&pullRequest=${PR}")

          for metric in new_coverage new_duplicated_lines_density new_lines; do
            val=$(echo "$METRICS_JSON" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for m in data.get('component',{}).get('measures',[]):
              if m['metric'] == '${metric}':
                  print(m.get('period',{}).get('value', m.get('value','N/A')))
                  break
          else:
              print('N/A')
          " 2>/dev/null || echo "N/A")

            case "$metric" in
              new_coverage)          echo "coverage=${val}" >> "$GITHUB_OUTPUT" ;;
              new_duplicated_lines_density) echo "duplication=${val}" >> "$GITHUB_OUTPUT" ;;
              new_lines)             echo "lines=${val}" >> "$GITHUB_OUTPUT" ;;
            esac
          done

          if [[ "$GATE_STATUS" == "ERROR" ]]; then
            exit 1
          fi

      - name: Post PR comment
        if: always() && steps.pr.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ steps.gate.outputs.status || steps.check.outputs.status }}';
            const coverage = '${{ steps.gate.outputs.coverage }}';
            const duplication = '${{ steps.gate.outputs.duplication }}';
            const lines = '${{ steps.gate.outputs.lines }}';
            const prNumber = ${{ steps.pr.outputs.number || 0 }};

            if (!prNumber) return;

            const marker = '<!-- sonarcloud-gate -->';
            let body = '';

            if (status === 'skipped' || status === 'NONE') {
              body = [
                marker,
                '### SonarCloud Quality Gate',
                '',
                'SonarCloud analysis not available for this PR.',
                'This may indicate a configuration issue. Check workflow logs.',
              ].join('\n');
            } else if (status === 'OK') {
              body = [
                marker,
                '### SonarCloud Quality Gate: Passed',
                '',
                '| Metric | Value | Threshold |',
                '|--------|-------|-----------|',
                `| Coverage on New Code | ${coverage}% | >= 70% |`,
                `| Duplication on New Code | ${duplication}% | <= 3% |`,
                `| New Lines | ${lines} | |`,
                '',
                `[View on SonarCloud](https://sonarcloud.io/summary/new_code?id=artifact-keeper_artifact-keeper&pullRequest=${prNumber})`,
              ].join('\n');
            } else if (status === 'ERROR') {
              body = [
                marker,
                '### SonarCloud Quality Gate: Failed',
                '',
                '| Metric | Value | Threshold |',
                '|--------|-------|-----------|',
                `| Coverage on New Code | ${coverage}% | >= 70% |`,
                `| Duplication on New Code | ${duplication}% | <= 3% |`,
                `| New Lines | ${lines} | |`,
                '',
                `[View details on SonarCloud](https://sonarcloud.io/summary/new_code?id=artifact-keeper_artifact-keeper&pullRequest=${prNumber})`,
              ].join('\n');
            } else {
              body = [
                marker,
                '### SonarCloud Quality Gate',
                '',
                `Quality gate status: ${status || 'unknown'}`,
              ].join('\n');
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
