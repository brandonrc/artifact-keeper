name: Documentation Issue
description: Report an issue with documentation or suggest improvements
labels: ["documentation", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping us improve the documentation! Clear documentation is essential for a great user experience.
  
  - type: dropdown
    id: doc-type
    attributes:
      label: Documentation Type
      description: What kind of documentation issue is this?
      options:
        - Missing documentation
        - Incorrect or outdated information
        - Unclear or confusing content
        - Typo or formatting issue
        - Missing examples
        - API documentation
        - Other
    validations:
      required: true
  
  - type: textarea
    id: location
    attributes:
      label: Location
      description: Where is the documentation issue located?
      placeholder: |
        - URL: https://artifactkeeper.com/docs/...
        - File: README.md, CONTRIBUTING.md, docs/...
        - Section: "Getting Started" > "Installation"
    validations:
      required: true
  
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What's wrong or missing?
      placeholder: Describe the documentation issue in detail
    validations:
      required: true
  
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested Improvement
      description: How could the documentation be improved?
      placeholder: Provide your suggestion for how to fix or improve this
    validations:
      required: false
  
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context about the documentation issue
      placeholder: |
        - Screenshots
        - Related documentation
        - User perspective (beginner, advanced, etc.)
    validations:
      required: false
  
  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      description: Please verify these items before submitting
      options:
        - label: I have searched existing issues to ensure this isn't a duplicate
          required: true
